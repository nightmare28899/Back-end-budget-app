name: Deploy Backend

on:
push:
branches: ["main"]

jobs:
deploy:
runs-on: ubuntu-latest
steps:
- name: Deploy over SSH
uses: appleboy/ssh-action@v1.2.0
with:
host: ${{ secrets.VPS_HOST }}
username: ${{ secrets.VPS_USER }}
key: ${{ secrets.VPS_SSH_KEY }}
port: ${{ secrets.VPS_PORT }}
script: |
set -e
cd /root
if [ ! -d Back-end-budget-app ]; then
git clone git@github.com:nightmare28899/Back-end-budget-app.git
fi
cd /root/Back-end-budget-app
git fetch origin main
git reset --hard origin/main
docker rm -f back-end-budget-app-api-1 2>/dev/null || true
docker build -t back-end-budget-app-api .
docker run -d --name back-end-budget-app-api-1 \
--network back-end-budget-app_default \
--env-file .env \
--entrypoint sh \
-l traefik.enable=true \
-l 'traefik.http.routers.budget.rule=Host(`kevinlg.cloud`) || Host(`www.kevinlg.cloud`)' \
-l traefik.http.routers.budget.entrypoints=websecure \
-l traefik.http.routers.budget.tls=true \
-l traefik.http.routers.budget.tls.certresolver=letsencrypt \
-l traefik.http.services.budget.loadbalancer.server.port=3000 \
back-end-budget-app-api \
-lc "node dist/src/main.js"