services:
    backend:
        build: .
        ports:
            - "3001:3000"
        env_file:
            - .env
        depends_on:
            - minio
        environment:
            MINIO_ENDPOINT: minio
            MINIO_PORT: "9000"
            MINIO_ACCESS_KEY: minioadmin
            MINIO_SECRET_KEY: SuperStrongPass123!
            MINIO_BUCKET: app-uploads
            MINIO_USE_SSL: "false"

    minio:
        image: minio/minio:latest
        container_name: minio
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: SuperStrongPass123!
        volumes:
            - minio-data:/data
        ports:
            - "9002:9000"
            - "9003:9001"
        restart: unless-stopped

volumes:
    minio-data:
